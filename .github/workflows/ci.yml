name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    shell: bash

# some jobs are currently running multiple config builds on the same worktree.
# it might be better to issue these as separate jobs or as a config matrix.

# debug builds are currently not built to keep the turnaround time on PRs shorter.

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
      - uses: actions/checkout@v4
      - run: |
          echo "Using MSYS2 environment:"
          echo "MSYSTEM=$MSYSTEM"
          echo "PATH=$PATH"
          echo "CC=$CC"
      - run:                 make -j4 platform=win config=tool   
      - run: git clean -f && make -j4 platform=win config=player
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lutro-core
          path: lutro_libretro.dll
