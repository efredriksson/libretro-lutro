name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

defaults:
  run:
    shell: bash

# some jobs are currently running multiple config builds on the same worktree.
# it might be better to issue these as separate jobs or as a config matrix.

# debug builds are currently not built to keep the turnaround time on PRs shorter.

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >
            git
            make
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
    
      - name: Install toolchain inside MSYS2
        shell: C:\msys64\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          pacman -S --noconfirm --needed \
            git \
            make \
            mingw-w64-x86_64-gcc \
            mingw-w64-x86_64-pkgconf

          which gcc
          which make
        
      - name: Build lutro core
        shell: C:\msys64\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          echo "MSYSTEM=$MSYSTEM"
          echo "PATH=$PATH"
          echo "Using CC: $(which gcc)"

          # Build using the same flags as the libretro buildbot
          make -j4 platform=win config=player

          echo "Build completed."
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: lutro-core
          path: lutro_libretro.dll
